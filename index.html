<head>
<meta charset="UTF-8" />

<title>미국 가족여행</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #eceff3; --surface: #ffffff; --surface-2: #f6f8fb;
    --ink: #14161a; --ink-2: #3a3f47; --muted: #6b7280; --muted-2: #9aa1ab;
    --line: #e4e7ec; --line-strong: #d4d9e0;
    --day-color: #1f6feb; --day-tint: rgba(31, 111, 235, 0.10);
    --warn: #d6442f; --warn-tint: #fdecea;
    --radius-sm: 11px; --radius-pill: 999px;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.05);
    --shadow-md: 0 6px 18px rgba(16, 24, 40, 0.08);
    --header-h: 64px; --nav-h: 60px;
    --font-sans: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  html, body { height: 100%; background: #eceff3; font-family: var(--font-sans); color: var(--ink); -webkit-font-smoothing: antialiased; }
  
  .app-container {
    max-width: 480px; margin: 0 auto; min-height: 100%; background: var(--bg);
    display: flex; flex-direction: column; position: relative; box-shadow: 0 0 32px rgba(0,0,0,0.05);
  }

  a.map-link { color: inherit; text-decoration: none !important; font-weight: 700; cursor: pointer; }
  a.map-link:hover { color: var(--day-color); }

  .topbar { height: var(--header-h); background: var(--ink); color: #fff; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 30; }
  .brand__title { font-size: 16px; font-weight: 800; }
  .brand__sub { font-size: 11px; color: #aeb4be; margin-top: 1px; }

  .day-selector {
    display: flex; overflow-x: auto; white-space: nowrap; gap: 8px; padding: 12px;
    background: var(--surface); border-bottom: 1px solid var(--line);
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .day-selector::-webkit-scrollbar { display: none; }
  
  .navbtn {
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    border: 1px solid var(--line); border-radius: 12px; padding: 8px 14px; cursor: pointer;
    min-width: 75px; flex: 0 0 auto; background: var(--surface); transition: all 0.15s ease;
  }
  .navbtn.is-active {
    border-color: var(--day-color); background-color: var(--day-tint) !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .navbtn__day { font-size: 13px; font-weight: 800; }
  .navbtn__theme { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .stage { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
  .reveal { animation: fade-up 0.3s ease both; }
  @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .day__heading { margin-bottom: 12px; }
  .eyebrow { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  .day__theme { font-size: 20px; font-weight: 800; margin-top: 2px; }
  .day__note { margin: 12px 0; font-size: 13px; background: var(--surface); border-left: 4px solid var(--day-color); padding: 10px; border-radius: 6px; color: var(--ink-2); line-height: 1.5; box-shadow: var(--shadow-sm); }

  .timeline { display: flex; flex-direction: column; gap: 10px; }
  .stop { display: grid; grid-template-columns: 46px 16px 1fr; }
  .stop__time { font-weight: 700; color: var(--day-color); font-size: 13px; padding-top: 10px; text-align: right; }
  .stop__rail { position: relative; }
  .stop__rail::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--day-color); opacity: 0.15; }
  .node { position: absolute; left: 50%; top: 14px; transform: translateX-%50; width: 8px; height: 8px; border-radius: 50%; background: var(--surface); border: 2px solid var(--day-color); }
  .stop--alert .node { border-color: var(--warn); }
  .stop--book .node { background: var(--day-color); }
  
  .stop__card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px; display: flex; gap: 8px; box-shadow: var(--shadow-sm); }
  .stop__card-left { flex: 0 0 auto; }
  .stop__card-right { flex: 1; min-width: 0; }
  .tag { font-size: 9px; font-weight: 700; border-radius: 4px; padding: 1px 4px; background: #eef2f8; color: #4b5563; }
  .tag--need { background: var(--day-color); color: #fff; }
  .stop__title { font-size: 14px; font-weight: 700; color: var(--ink); }
  .stop__place { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .stop__meta { font-size: 12.5px; color: var(--ink-2); margin-top: 4px; line-height: 1.4; }

  .info-view { display: flex; flex-direction: column; gap: 12px; }
  .info-card { background: var(--surface); padding: 14px; border-radius: 12px; border: 1px solid var(--line); box-shadow: var(--shadow-sm); }
  .info-card h3 { font-size: 14.5px; font-weight: 700; margin-bottom: 4px; }
  .info-card p { font-size: 13px; color: var(--ink-2); line-height: 1.4; }
  .alt-list { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .alt-item { font-size: 12px; background: var(--surface-2); padding: 6px; border-radius: 6px; color: var(--ink-2); }

  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0; height: var(--nav-h);
    background: var(--surface); border-top: 1px solid var(--line);
    display: grid; grid-template-columns: 1fr 1fr 1fr; z-index: 40;
  }
  .tabbtn {
    border: 0; background: transparent; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 11px; font-weight: 600;
    color: var(--muted); cursor: pointer;
  }
  .tabbtn.is-active { color: var(--ink); font-weight: 800; }
  .tabbtn-icon { font-size: 18px; margin-bottom: 2px; }
</style>
</head>
<body>

  <div class="app-container">

let currentTab = 'schedule';
let currentDayIdx = 0;

function initApp() {
  renderDaySelector();
  showSchedule();
}

function renderDaySelector() {
  const container = document.getElementById("daySelector");
  let html = "";
  globalData.DAYS.forEach((d, i) => {
    const formattedDate = d.date.replace(/ /g, '') + `(${d.dow})`;
    html += `
      <button class="navbtn" id="nb-${i}" style="background-color: ${d.cityBg};" onclick="changeDay(${i})">
        <span class="navbtn__day" style="color: ${d.color};">${formattedDate}</span>
        <span class="navbtn__theme">DAY ${d.n}</span>
      </button>`;
  });
  container.innerHTML = html;
}

function changeDay(idx) {
  currentDayIdx = idx;
  switchTab('schedule');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tabbtn').forEach(b => b.classList.remove('is-active'));
  document.getElementById(`tab-${tab}`).classList.add('is-active');

  if (tab === 'schedule') {
    document.getElementById('daySelector').style.display = 'flex';
    showSchedule();
  } else {
    document.getElementById('daySelector').style.display = 'none';
    if (tab === 'alerts') showAlerts();
    if (tab === 'booking') showBooking();
  }
}

function showSchedule() {
  document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('is-active'));
  const activeBtn = document.getElementById(`nb-${currentDayIdx}`);
  if(activeBtn) {
    activeBtn.classList.add('is-active');
    activeBtn.parentNode.scrollTo({ left: activeBtn.offsetLeft - 20, behavior: 'smooth' });
  }
  
  const d = globalData.DAYS[currentDayIdx];
  document.documentElement.style.setProperty("--day-color", d.color);
  
  let stopsHtml = d.stops.map(s => `
    <div class="stop ${s.kind === '예약' ? 'stop--book' : ''}">
      <div class="stop__time">${s.time}</div>
      <div class="stop__rail"><span class="node"></span></div>
      <div class="stop__card">
        <div class="stop__card-left"><span class="tag ${s.kind === '예약' ? 'tag--need' : ''}">${s.kind}</span></div>
        <div class="stop__card-right">
          <div class="stop__title">${s.title}</div>
          ${s.place ? `<div class="stop__place">📍 ${s.place}</div>` : ''}
          ${s.meta ? `<div class="stop__meta">${s.meta}</div>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('stageInner').innerHTML = `
    <div class="reveal">
      <div class="day__heading">
        <div class="eyebrow">DAY ${d.n} · ${d.date}.(${d.dow})</div>
        <div class="day__theme">${d.theme}</div>
      </div>
      ${d.note ? `<div class="day__note">${d.note}</div>` : ''}
      <div class="timeline">${stopsHtml}</div>
    </div>`;
}

function showAlerts() {
  let html = `<div class="info-view reveal"><h2>⚠️ 필수 확인 사항</h2>`;
  html += globalData.ALERTS.map(a => `
    <div class="info-card">
      <h3>${a.title}</h3>
      <p>${a.body}</p>
    </div>
  `).join('');
  html += `</div>`;
  document.getElementById('stageInner').innerHTML = html;
}

function showBooking() {
  let html = `<div class="info-view reveal"><h2>🎫 예약 체크리스트</h2>`;
  html += globalData.BOOKING.map(b => `
    <div class="info-card">
      <h3>${b.title}</h3>
      <p>${b.detail}</p>
    </div>
  `).join('');
  html += `</div>`;
  document.getElementById('stageInner').innerHTML = html;
}

initApp();
</script>
